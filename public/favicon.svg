<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Paper coming out -->
  <rect x="34" y="8" width="60" height="40" rx="3" fill="#e2e8f0" />
  <rect x="44" y="16" width="30" height="3" rx="1" fill="#94a3b8" />
  <rect x="44" y="23" width="40" height="3" rx="1" fill="#94a3b8" />
  <rect x="44" y="30" width="24" height="3" rx="1" fill="#94a3b8" />

  <!-- Printer body -->
  <rect x="20" y="42" width="88" height="50" rx="12" fill="url(#body)" />

  <!-- Printer slot -->
  <rect x="32" y="42" width="64" height="8" rx="2" fill="#1e1b4b" />

  <!-- Face - eyes -->
  <circle cx="48" cy="70" r="6" fill="#1e1b4b" />
  <circle cx="80" cy="70" r="6" fill="#1e1b4b" />
  <circle cx="50" cy="68" r="2.5" fill="white" />
  <circle cx="82" cy="68" r="2.5" fill="white" />

  <!-- Face - smile -->
  <path d="M54 80 Q64 90 74 80" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round" fill="none" />

  <!-- Feet -->
  <rect x="32" y="92" width="20" height="12" rx="6" fill="url(#feet)" />
  <rect x="76" y="92" width="20" height="12" rx="6" fill="url(#feet)" />

  <!-- Button -->
  <circle cx="98" cy="58" r="4" fill="#22d3ee" />

  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="feet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
  </defs>
</svg>
