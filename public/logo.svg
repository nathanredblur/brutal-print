<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Paper coming out -->
  <rect x="22" y="4" width="36" height="26" rx="2" fill="#e2e8f0" />
  <rect x="28" y="10" width="18" height="2" rx="1" fill="#94a3b8" />
  <rect x="28" y="15" width="24" height="2" rx="1" fill="#94a3b8" />
  <rect x="28" y="20" width="14" height="2" rx="1" fill="#94a3b8" />

  <!-- Printer body -->
  <rect x="12" y="26" width="56" height="32" rx="8" fill="url(#hbody)" />

  <!-- Printer slot -->
  <rect x="20" y="26" width="40" height="5" rx="1.5" fill="#1e1b4b" />

  <!-- Face - eyes -->
  <circle cx="32" cy="44" r="4" fill="#1e1b4b" />
  <circle cx="52" cy="44" r="4" fill="#1e1b4b" />
  <circle cx="33.2" cy="42.8" r="1.6" fill="white" />
  <circle cx="53.2" cy="42.8" r="1.6" fill="white" />

  <!-- Face - smile -->
  <path d="M35 51 Q40.5 57 47 51" stroke="#1e1b4b" stroke-width="2" stroke-linecap="round" fill="none" />

  <!-- Feet -->
  <rect x="20" y="58" width="14" height="8" rx="4" fill="url(#hfeet)" />
  <rect x="48" y="58" width="14" height="8" rx="4" fill="url(#hfeet)" />

  <!-- Button -->
  <circle cx="60" cy="35" r="2.5" fill="#22d3ee" />

  <defs>
    <linearGradient id="hbody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="hfeet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
  </defs>
</svg>
